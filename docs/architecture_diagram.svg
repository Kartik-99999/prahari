<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" font-family="-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="at" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2DD4BF"/>
    </marker>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#EF4444"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1000" height="470" rx="12" fill="#0A0E14"/>

  <!-- title -->
  <text x="24" y="38" font-size="20" font-weight="700" letter-spacing="1">
    <tspan fill="#E2E8F0">PRAHAR</tspan><tspan fill="#FF9933">Í</tspan>
  </text>
  <text x="24" y="56" font-size="10" fill="#94A3B8">Behavioural Cyber Resilience — one closed, auditable loop</text>
  <text x="976" y="38" font-size="9" fill="#94A3B8" text-anchor="end" font-family="ui-monospace,Menlo,monospace">
    MTTD <tspan fill="#2DD4BF">1.66 d</tspan> · recall <tspan fill="#2DD4BF">100% @~1% FPR</tspan> · ATT&amp;CK <tspan fill="#2DD4BF">92.3%</tspan> · SOAR <tspan fill="#2DD4BF">75%</tspan>
  </text>
  <text x="976" y="54" font-size="9" fill="#94A3B8" text-anchor="end" font-family="ui-monospace,Menlo,monospace">CIC-IDS-2017 macro ROC <tspan fill="#2DD4BF">0.845</tspan> (held-out)</text>

  <!-- incoming telemetry -->
  <text x="24" y="82" font-size="9" fill="#EF4444" font-family="ui-monospace,Menlo,monospace">IT + OT telemetry</text>
  <line x1="89" y1="86" x2="89" y2="98" stroke="#EF4444" stroke-width="1.4" stroke-dasharray="3,3" marker-end="url(#ar)"/>

  <!-- human gate badge -->
  <rect x="609" y="68" width="144" height="18" rx="9" fill="none" stroke="#FACC15" stroke-width="1"/>
  <text x="681" y="80" font-size="9" fill="#FACC15" text-anchor="middle">2 HIGH → human gate</text>
  <line x1="681" y1="86" x2="681" y2="100" stroke="#FACC15" stroke-width="1" stroke-dasharray="2,3"/>

  <!-- six stages -->
  <g>
    <rect x="24"  y="100" width="130" height="64" rx="8" fill="#121823" stroke="#243044"/>
    <text x="89"  y="122" font-size="12" font-weight="600" fill="#E2E8F0" text-anchor="middle">1 · INGEST</text>
    <text x="89"  y="138" font-size="9"  fill="#94A3B8" text-anchor="middle">OCSF SecurityEvent</text>
    <text x="89"  y="152" font-size="9"  fill="#94A3B8" text-anchor="middle">normalize IT + OT</text>

    <rect x="172" y="100" width="130" height="64" rx="8" fill="#121823" stroke="#243044"/>
    <text x="237" y="122" font-size="12" font-weight="600" fill="#E2E8F0" text-anchor="middle">2 · UEBA</text>
    <text x="237" y="138" font-size="9" fill="#94A3B8" text-anchor="middle">unsupervised scoring</text>
    <text x="237" y="152" font-size="9" fill="#94A3B8" text-anchor="middle">no signatures · no labels</text>

    <rect x="320" y="100" width="130" height="64" rx="8" fill="#121823" stroke="#2DD4BF"/>
    <text x="385" y="122" font-size="12" font-weight="600" fill="#2DD4BF" text-anchor="middle">3 · GRAPH FUSION</text>
    <text x="385" y="138" font-size="9" fill="#94A3B8" text-anchor="middle">anomaly lift = pPR / PR</text>
    <text x="385" y="152" font-size="9" fill="#94A3B8" text-anchor="middle">weak signals → 1 chain</text>

    <rect x="468" y="100" width="130" height="64" rx="8" fill="#121823" stroke="#243044"/>
    <text x="533" y="122" font-size="12" font-weight="600" fill="#E2E8F0" text-anchor="middle">4 · ATTRIBUTION</text>
    <text x="533" y="138" font-size="9" fill="#94A3B8" text-anchor="middle">Claude agents + RAG</text>
    <text x="533" y="152" font-size="9" fill="#94A3B8" text-anchor="middle">ATT&amp;CK + next move</text>

    <rect x="616" y="100" width="130" height="64" rx="8" fill="#121823" stroke="#243044"/>
    <text x="681" y="122" font-size="12" font-weight="600" fill="#E2E8F0" text-anchor="middle">5 · SOAR</text>
    <text x="681" y="138" font-size="9" fill="#94A3B8" text-anchor="middle">auto where safe (75%)</text>
    <text x="681" y="152" font-size="9" fill="#94A3B8" text-anchor="middle">platform-enforced gates</text>

    <rect x="764" y="100" width="130" height="64" rx="8" fill="#121823" stroke="#243044"/>
    <text x="829" y="122" font-size="12" font-weight="600" fill="#E2E8F0" text-anchor="middle">6 · AUDIT</text>
    <text x="829" y="138" font-size="9" fill="#94A3B8" text-anchor="middle">every action ledgered</text>
    <text x="829" y="152" font-size="9" fill="#94A3B8" text-anchor="middle">tamper-evident</text>
  </g>

  <!-- stage arrows -->
  <line x1="154" y1="132" x2="168" y2="132" stroke="#2DD4BF" stroke-width="1.6" marker-end="url(#at)"/>
  <line x1="302" y1="132" x2="316" y2="132" stroke="#2DD4BF" stroke-width="1.6" marker-end="url(#at)"/>
  <line x1="450" y1="132" x2="464" y2="132" stroke="#2DD4BF" stroke-width="1.6" marker-end="url(#at)"/>
  <line x1="598" y1="132" x2="612" y2="132" stroke="#2DD4BF" stroke-width="1.6" marker-end="url(#at)"/>
  <line x1="746" y1="132" x2="760" y2="132" stroke="#2DD4BF" stroke-width="1.6" marker-end="url(#at)"/>

  <!-- datastores -->
  <g font-family="ui-monospace,Menlo,monospace">
    <line x1="89" y1="164" x2="150" y2="200" stroke="#243044" stroke-width="1"/>
    <line x1="237" y1="164" x2="200" y2="200" stroke="#243044" stroke-width="1"/>
    <rect x="88" y="200" width="176" height="42" rx="6" fill="#0E1420" stroke="#243044"/>
    <text x="176" y="217" font-size="9.5" fill="#E2E8F0" text-anchor="middle">Redis Streams</text>
    <text x="176" y="231" font-size="8.5" fill="#94A3B8" text-anchor="middle">events:raw · consumer groups</text>

    <line x1="385" y1="164" x2="385" y2="200" stroke="#243044" stroke-width="1"/>
    <rect x="320" y="200" width="130" height="42" rx="6" fill="#0E1420" stroke="#243044"/>
    <text x="385" y="217" font-size="9.5" fill="#E2E8F0" text-anchor="middle">Neo4j</text>
    <text x="385" y="231" font-size="8.5" fill="#94A3B8" text-anchor="middle">provenance graph</text>

    <line x1="533" y1="164" x2="533" y2="200" stroke="#243044" stroke-width="1"/>
    <rect x="468" y="200" width="130" height="42" rx="6" fill="#0E1420" stroke="#243044"/>
    <text x="533" y="217" font-size="9.5" fill="#E2E8F0" text-anchor="middle">Chroma RAG</text>
    <text x="533" y="231" font-size="8.5" fill="#94A3B8" text-anchor="middle">697 ATT&amp;CK + advisories</text>

    <line x1="829" y1="164" x2="829" y2="200" stroke="#243044" stroke-width="1"/>
    <rect x="744" y="200" width="170" height="42" rx="6" fill="#0E1420" stroke="#243044"/>
    <text x="829" y="215" font-size="9.5" fill="#E2E8F0" text-anchor="middle">Postgres — audit ledger</text>
    <g stroke="#34D399" stroke-width="1" fill="none">
      <rect x="779" y="222" width="22" height="11" rx="2"/>
      <rect x="811" y="222" width="22" height="11" rx="2"/>
      <rect x="843" y="222" width="22" height="11" rx="2"/>
      <line x1="801" y1="227.5" x2="811" y2="227.5"/>
      <line x1="833" y1="227.5" x2="843" y2="227.5"/>
    </g>
    <text x="790" y="230.5" font-size="7" fill="#34D399" text-anchor="middle">h₀</text>
    <text x="822" y="230.5" font-size="7" fill="#34D399" text-anchor="middle">h₁</text>
    <text x="854" y="230.5" font-size="7" fill="#34D399" text-anchor="middle">h₂</text>
  </g>

  <!-- serving layer -->
  <line x1="385" y1="242" x2="385" y2="278" stroke="#243044" stroke-width="1"/>
  <line x1="829" y1="242" x2="829" y2="278" stroke="#243044" stroke-width="1"/>
  <rect x="214" y="278" width="620" height="38" rx="8" fill="#121823" stroke="#243044"/>
  <text x="524" y="301" font-size="10.5" fill="#E2E8F0" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">FastAPI BFF :8000 — read model over Neo4j + Postgres · strips gt_* <tspan fill="#34D399">(verified 0/8 leak)</tspan></text>
  <line x1="524" y1="316" x2="524" y2="338" stroke="#2DD4BF" stroke-width="1.6" marker-end="url(#at)"/>
  <rect x="214" y="340" width="620" height="42" rx="8" fill="#121823" stroke="#2DD4BF"/>
  <text x="524" y="358" font-size="11" font-weight="600" text-anchor="middle">
    <tspan fill="#E2E8F0">SOC console — Next.js :3000</tspan>
  </text>
  <text x="524" y="373" font-size="9" fill="#94A3B8" text-anchor="middle">cinematic incident replay 1×/4×/12× · provenance graph (system's own scores) · playbook approvals · audit view</text>

  <!-- counterfactual ribbon -->
  <text x="24" y="420" font-size="10" fill="#FACC15" font-family="ui-monospace,Menlo,monospace">counterfactual: containment on day 1.7 severs C2 — 17 days before exfil → breach prevented</text>

  <!-- legend + footer -->
  <text x="24" y="448" font-size="8.5" fill="#64748B">red = attack telemetry in · teal = control flow · amber = human sovereignty · green = integrity</text>
  <text x="976" y="448" font-size="9" fill="#34D399" text-anchor="end" font-family="ui-monospace,Menlo,monospace">independently verified end-to-end — all gates GREEN</text>
</svg>
